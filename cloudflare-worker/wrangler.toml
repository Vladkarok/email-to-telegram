name = "email-to-telegram"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
workers_dev = false
preview_urls = false

# Secrets — set with:
#   wrangler secret put WORKER_SECRET [--env staging|production]
#   wrangler secret put VPS_URL       [--env staging|production]
#
# VPS_URL example: https://mail.example.com
#
# Email routing is configured in the Cloudflare dashboard per zone:
#   Email → Email Routing → Routing rules → Catch-all → Send to Worker → <this worker>
#
# Deploy:
#   wrangler deploy --env staging
#   wrangler deploy --env production

[env.staging]
name = "email-to-telegram-staging"

[env.production]
name = "email-to-telegram-production"
