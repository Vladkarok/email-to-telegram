services:
  app:
    image: email-to-telegram:local
    build:
      context: ../..
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - attachments:/data/attachments
      - rawemails:/data/rawemails
      - backups:/data/backups
    networks:
      - internal
    mem_limit: 256m
    pids_limit: 200
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    mem_limit: 128m
    pids_limit: 100
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: emailtelegram
      POSTGRES_USER: emailtelegram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    mem_limit: 256m
    pids_limit: 200
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailtelegram"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  attachments:
  rawemails:
  backups:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
