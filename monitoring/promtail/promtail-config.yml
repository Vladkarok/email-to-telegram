# Promtail configuration: ships docker container logs to Loki using docker
# service discovery. Static label env=staging; override in a prod deployment.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container_name
      - source_labels: ["__meta_docker_container_id"]
        target_label: container_id
      - target_label: env
        replacement: staging
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: output
