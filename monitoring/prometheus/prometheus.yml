# Prometheus configuration for the email-to-telegram monitoring stack.
#
# Bearer tokens for /metrics scraping are read from files mounted under
# /etc/prometheus/secrets/. Those files are populated by the deploy workflow
# on the host at ./prometheus/secrets/{staging_token,prod_token} from the
# METRICS_BEARER_TOKEN_STAGING / METRICS_BEARER_TOKEN_PROD env vars.
#
# Each file must contain only the raw bearer token, no trailing newline.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: email_to_telegram

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: email_to_telegram_staging
    metrics_path: /metrics
    scheme: http
    scrape_interval: 30s
    bearer_token_file: /etc/prometheus/secrets/staging_token
    static_configs:
      # `service` is set on the exporter side via prom-client default
      # labels; do not duplicate it here or Prometheus will rename it to
      # `exported_service` and keep the target label as `service`.
      - targets: ["app:3000"]
        labels:
          env: staging

  - job_name: email_to_telegram_prod
    metrics_path: /metrics
    scheme: http
    scrape_interval: 30s
    bearer_token_file: /etc/prometheus/secrets/prod_token
    static_configs:
      - targets: ["10.0.88.2:3000"]
        labels:
          env: prod
