services:
  app:
    image: ghcr.io/vladkarok/email-to-telegram:latest
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - attachments:/data/attachments
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: emailtelegram
      POSTGRES_USER: emailtelegram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailtelegram"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  attachments:
