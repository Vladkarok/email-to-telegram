name: Deploy

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_SHA,GITHUB_REF_NAME,IMAGE_NAME
          script: |
            set -e
            cd ~/email-to-telegram

            # Check out the exact tagged commit so the runtime config matches
            # the image built for this release.
            git fetch origin main --tags
            git checkout --detach "$GITHUB_SHA"

            # Authenticate to GHCR and pull new image
            image_owner=$(printf '%s' "$IMAGE_NAME" | cut -d/ -f2)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$image_owner" --password-stdin
            APP_IMAGE="$IMAGE_NAME" IMAGE_TAG="$GITHUB_REF_NAME" docker compose pull app

            # Restart with the exact tagged image; the app entrypoint runs migrations on startup.
            APP_IMAGE="$IMAGE_NAME" IMAGE_TAG="$GITHUB_REF_NAME" docker compose up -d --remove-orphans --no-build

            container_id=$(APP_IMAGE="$IMAGE_NAME" IMAGE_TAG="$GITHUB_REF_NAME" docker compose ps -q app)
            test -n "$container_id"

            attempts=0
            while true; do
              attempts=$((attempts + 1))
              health=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
              if [ "$health" = "healthy" ]; then
                break
              fi
              if [ "$health" = "unhealthy" ] || [ "$health" = "exited" ] || [ "$health" = "dead" ] || [ "$attempts" -ge 30 ]; then
                docker logs "$container_id" --tail 100
                exit 1
              fi
              sleep 5
            done

            echo "Deploy complete at $(date)"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
