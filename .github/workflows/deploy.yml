name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to deploy, for example v1.7.1
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-release
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_sha: ${{ steps.resolve.outputs.release_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate release tag
        id: resolve
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          git fetch origin main --tags --force

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="$INPUT_RELEASE_TAG"
          else
            release_tag="$GITHUB_REF_NAME"
          fi

          if [ -z "$release_tag" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi

          git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" >/dev/null
          release_sha=$(git rev-list -n 1 "$release_tag")
          git merge-base --is-ancestor "$release_sha" origin/main

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and push Docker image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: resolve-release
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_sha }}
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vladkarok/email-to-telegram:latest
            ghcr.io/vladkarok/email-to-telegram:${{ needs.resolve-release.outputs.release_tag }}

  deploy-from-tag-push:
    name: Deploy to VPS
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux, x64, email-tg-prod]
    needs: [resolve-release, build-and-push]

    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_sha }}

      - name: Ensure monitoring_scrape network exists
        # docker-compose.yml declares monitoring_scrape as external. Create
        # it idempotently so deploys do not fail on a fresh prod host that
        # has never had the monitoring stack provisioned.
        run: |
          ssh prod "docker network inspect monitoring_scrape >/dev/null 2>&1 || docker network create monitoring_scrape"

      - name: Copy compose file to prod
        run: scp docker-compose.yml prod:~/email-to-telegram/docker-compose.yml

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          ssh prod bash << EOF
          set -e
          cd ~/email-to-telegram

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u vladkarok --password-stdin
          IMAGE_TAG="${RELEASE_TAG}" docker compose --env-file .env pull app
          IMAGE_TAG="${RELEASE_TAG}" docker compose --env-file .env up -d --remove-orphans --no-build

          container_id=\$(IMAGE_TAG="${RELEASE_TAG}" docker compose --env-file .env ps -q app)
          test -n "\$container_id"

          attempts=0
          while true; do
            attempts=\$((attempts + 1))
            health=\$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "\$container_id")
            if [ "\$health" = "healthy" ]; then
              break
            fi
            if [ "\$health" = "unhealthy" ] || [ "\$health" = "exited" ] || [ "\$health" = "dead" ] || [ "\$attempts" -ge 30 ]; then
              docker logs "\$container_id" --tail 100
              exit 1
            fi
            sleep 5
          done

          echo "Deploy complete at \$(date)"
          EOF

  redeploy-existing-release:
    name: Redeploy existing release to VPS
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, x64, email-tg-prod]
    needs: resolve-release

    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-release.outputs.release_sha }}

      - name: Ensure monitoring_scrape network exists
        # docker-compose.yml declares monitoring_scrape as external. Create
        # it idempotently so deploys do not fail on a fresh prod host that
        # has never had the monitoring stack provisioned.
        run: |
          ssh prod "docker network inspect monitoring_scrape >/dev/null 2>&1 || docker network create monitoring_scrape"

      - name: Copy compose file to prod
        run: scp docker-compose.yml prod:~/email-to-telegram/docker-compose.yml

      - name: Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          ssh prod bash << EOF
          set -e
          cd ~/email-to-telegram

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u vladkarok --password-stdin
          IMAGE_TAG="${RELEASE_TAG}" docker compose --env-file .env pull app
          IMAGE_TAG="${RELEASE_TAG}" docker compose --env-file .env up -d --remove-orphans --no-build

          container_id=\$(IMAGE_TAG="${RELEASE_TAG}" docker compose --env-file .env ps -q app)
          test -n "\$container_id"

          attempts=0
          while true; do
            attempts=\$((attempts + 1))
            health=\$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "\$container_id")
            if [ "\$health" = "healthy" ]; then
              break
            fi
            if [ "\$health" = "unhealthy" ] || [ "\$health" = "exited" ] || [ "\$health" = "dead" ] || [ "\$attempts" -ge 30 ]; then
              docker logs "\$container_id" --tail 100
              exit 1
            fi
            sleep 5
          done

          echo "Manual redeploy complete at \$(date)"
          EOF
