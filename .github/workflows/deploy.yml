name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/vladkarok/email-to-telegram:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd ~/email-to-telegram

            # Pull latest code
            git pull origin main

            # Authenticate to GHCR and pull new image
            echo "$GHCR_TOKEN" | docker login ghcr.io -u vladkarok --password-stdin
            docker compose pull

            # Restart with new image, run migrations
            docker compose up -d --remove-orphans
            docker compose exec -T app node dist/index.js --migrate-only || true

            echo "Deploy complete at $(date)"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
